name: Agent Manifest

on:
  pull_request:
  push:
    branches: [main]

jobs:
  manifest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install crawler
        working-directory: tools/lumen_manifest_crawler
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Run tests
        working-directory: tools/lumen_manifest_crawler
        run: pytest

      - name: Generate manifest, datasets, and adapter-first fine-tuning artifacts
        run: |
          python -m lumen_manifest_crawler generate \
            --root . \
            --output generated/agent_manifest \
            --pretty \
            --generate-agent-fine-tuning \
            --fine-tuning-output generated/agent_manifest/fine_tuning
        env:
          PYTHONPATH: tools/lumen_manifest_crawler

      - name: Run improvement-loop dry pass
        run: |
          python -m lumen_manifest_crawler improve-loop \
            --root . \
            --output generated/agent_manifest \
            --loop-output generated/agent_improvement_loop \
            --fine-tuning-output generated/agent_manifest/fine_tuning \
            --dry-run-commands \
            --test-command "python -m pytest tools/lumen_manifest_crawler/tests" \
            --testflight-build-label "ci-pr-${{ github.event.pull_request.number || github.run_number }}" \
            --testflight-scenario-limit 120 \
            --no-fail-on-validation
        env:
          PYTHONPATH: tools/lumen_manifest_crawler

      - name: Verify adapter-first fine-tuning contract
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          root = Path('generated/agent_manifest/fine_tuning')
          runtime = json.loads((root / 'adapter_runtime_manifest.json').read_text())
          assert runtime['mode'] == 'adapter_first'
          assert runtime['runtimeStrategy']['loadBaseModelOnce'] is True
          assert runtime['runtimeStrategy']['selectAdapterByAgentSlot'] is True
          assert runtime['runtimeStrategy']['mergeAdaptersByDefault'] is False
          assert runtime['releaseBakePolicy']['enabledByDefault'] is False

          for agent in ['cortex', 'executor', 'mouth', 'mimicry', 'rem', 'fleet']:
              config = json.loads((root / agent / 'unsloth_config.json').read_text())
              plan = json.loads((root / agent / 'adapter_export_plan.json').read_text())
              assert config['artifactMode'] == 'adapter_first', agent
              assert config['defaultExportArtifact'] == 'lora_adapter', agent
              assert config['adapterExport']['saveAdapterByDefault'] is True, agent
              assert config['adapterExport']['mergeAdaptersByDefault'] is False, agent
              assert config['mergeExport']['enabledByDefault'] is False, agent
              assert plan['mode'] == 'adapter_first', agent
              assert plan['exportPolicy']['defaultArtifact'] == 'adapter', agent
              assert plan['exportPolicy']['mergeAdaptersByDefault'] is False, agent
          PY

      - name: Check generated artifacts are committed
        run: |
          git diff --exit-code generated/agent_manifest
          untracked="$(git ls-files --others --exclude-standard generated/agent_manifest)"
          if [ -n "$untracked" ]; then
            echo "Untracked generated manifest artifacts detected:"
            echo "$untracked"
            exit 1
          fi

      - name: Upload generated manifest artifacts
        if: ${{ always() && !env.ACT }}
        uses: actions/upload-artifact@v4
        with:
          name: agent-manifest
          path: generated/agent_manifest

      - name: Upload improvement-loop report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: agent-improvement-loop
          path: |
            generated/agent_improvement_loop/LOOP_REPORT.md
            generated/agent_improvement_loop/loop_state.json
            generated/agent_improvement_loop/loop_gaps.json
            generated/agent_improvement_loop/next_action_prompts.jsonl
            generated/agent_improvement_loop/testflight_scenarios.jsonl
            generated/agent_improvement_loop/TESTFLIGHT_RUNBOOK.md
